name: Collect Hyperliquid OI samples
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: oi-collect
  cancel-in-progress: false
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run collector
        run: node collect.mjs
      - name: Commit history
        run: |
          git config user.name "oi-collector-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git commit -m "OI sample [skip ci]" || echo "nothing to commit"
          git pull --rebase origin main || true
          git push
